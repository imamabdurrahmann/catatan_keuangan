name: Release

on:
  release:
    types: [ published ]

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.19.0
          cache: true
          pub-cache: true

      - run: flutter pub get

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.jks
          echo "KEYSTORE_FILE=release.jks" >> local.properties
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> local.properties
          echo "KEY_ALIAS=$KEY_ALIAS" >> local.properties
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> local.properties

      - name: Parse version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version
        run: |
          sed -i 's/version: .*/version: ${{ steps.version.outputs.VERSION }}/' pubspec.yaml

      - name: Build AAB
        run: |
          flutter build appbundle --release \
            --obfuscate \
            --split-debug-info=build/app/outputs/symbols

      - name: Upload to Play Store (Internal)
        uses: r0adkll/upload-google-play@v1
        with:
          service-account-json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          package-name: com.example.catatan_keuangan
          release-files: build/app/outputs/bundle/release/app-release.aab
          track: internal
          in-app-update-priority: 5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
